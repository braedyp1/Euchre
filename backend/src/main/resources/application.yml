server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: euchre-platform-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/euchre}
    username: ${DB_USERNAME:euchre}
    password: ${DB_PASSWORD:euchre}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

logging:
  level:
    com.euchre.platform: INFO
