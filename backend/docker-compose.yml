services:
  postgres:
    image: postgres:16-alpine
    container_name: euchre-postgres
    environment:
      POSTGRES_DB: euchre
      POSTGRES_USER: euchre
      POSTGRES_PASSWORD: euchre
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U euchre -d euchre"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
